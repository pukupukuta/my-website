<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avoid & Strike</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <style>
    body {
    margin: 0;
    overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,

    width: 500,
    height: 700,
  
    backgroundColor: "#222",
  
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
    },

    scene: {
        create: create,
        update: update
    }
};

let game = new Phaser.Game(config);

let enemy;
let state = "safe";
let score = 0;
let scoreText;

let multiplier = 1;
let nextMultiplierScore = 10;
let multiplierText;

let speed = 1500; // ミリ秒

function create() {
    // 敵
    enemy = this.add.rectangle(
        this.scale.width / 2,
        this.scale.height / 2,
        150,
        150,
        0x00ff00
    );

    // スコア
    scoreText = this.add.text(20, 20, "Score: 0", {
        fontSize: "24px",
        fill: "#fff"
    });

    multiplierText = this.add.text(20, 55, "倍率: x1", {
        fontSize: "24px",
        fill: "#ffff00"
    });

    // タップ判定
    this.input.on("pointerdown", () => {
        if (state === "safe") {
            onSuccess(this, 1); // ←通常
        } else if (state === "warning"){
            onSuccess(this, 3); // ←3倍！
        } else {
            onGameOver();
        }
    });

    enemyLoop.call(this);
}

function enemyLoop() {
    this.time.delayedCall(speed, () => {

        // 🟡 予兆
        enemy.setFillStyle(0xffff00);
        state = "warning"; // ←これ追加！
        updateEnemyColor();

        // 点滅させる（2回）
        this.tweens.add({
            targets: enemy,
            alpha: 0.3,
            yoyo: true,
            repeat: 2,
            duration: 50,
            onComplete: () => {

                // 🔴 攻撃
                enemy.setFillStyle(0xff0000);
                enemy.alpha = 1;
                state = "danger";
                updateEnemyColor();

                this.time.delayedCall(300, () => {

                    // 🟢 戻る
                    enemy.setFillStyle(0x00ff00);
                    state = "safe";
                    updateEnemyColor();

                    // ランダムスピード
                    speed = Phaser.Math.Between(200, 2000);

                    enemyLoop.call(this);
                });
            }
        });

    });
}

function update() {}

function updateEnemyColor() {

    if (state === "safe") {
        enemy.setFillStyle(0x00ff00);
    }

    if (state === "warning") {
        enemy.setFillStyle(0xffff00);
    }

    if (state === "danger") {
        enemy.setFillStyle(0xff0000);
    }
}

function onSuccess(scene, hitMultiplier) {
    console.log(
        "成功！ 加算:" + (1 * hitMultiplier * multiplier)
        + " 倍率x" + multiplier
    );

    score += 1 * hitMultiplier * multiplier;

  // 倍率アップ判定
if (score >= nextMultiplierScore) {

    multiplier++;

    nextMultiplierScore += 50;

    multiplierText.setText(
        "倍率: x" + multiplier
    );

    let levelUp = scene.add.text(
        enemy.x,
        enemy.y - 120,
        "倍率UP! x" + multiplier,
        {
            fontSize: "36px",
            fill: "#00ffff"
        }
    ).setOrigin(0.5);


    scene.tweens.add({
        targets: levelUp,
        y: 200,
        alpha: 0,
        duration: 800,
        onComplete: () => levelUp.destroy()
    });
}
  
    scoreText.setText("Score: " + score);

    scoreText.setScale(1.2);
    scene.tweens.add({
        targets: scoreText,
        scale: 1,
        duration: 100
    });

    // GOOD表示も強化できる👇
    let text = hitMultiplier >= 3 ? "PERFECT!" : "GOOD!";

    let msg = scene.add.text(enemy.x, enemy.y - 100, text, {
        fontSize: "40px",
        fill: hitMultiplier >= 3 ? "#ff00ff" : "#ffff00"
    }).setOrigin(0.5);

    scene.tweens.add({
        targets: msg,
        y: 200,
        alpha: 0,
        duration: 300,
        onComplete: () => msg.destroy()
    });

    scene.cameras.main.shake(100, 0.01);
}

function onGameOver() {
    alert("ゲームオーバー！ スコア: " + score);
    location.reload();
}

</script>

</body>
</html>
