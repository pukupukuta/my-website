<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avoid & Strike</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <style>
    body {
    margin: 0;
    overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,

    width: 600,
    height: 700,
  
    backgroundColor: "#222",
  
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
    },

    scene: {
        create: create,
        update: update
    }
};

let game = new Phaser.Game(config);

let enemy;
let state = "safe";
let score = 0;
let scoreText;
let speed = 1500; // ミリ秒

function create() {
    // 敵
    enemy = this.add.rectangle(
        this.scale.width / 2,
        this.scale.height / 2,
        150,
        150,
        0x00ff00
    );

    // スコア
    scoreText = this.add.text(20, 20, "Score: 0", {
        fontSize: "24px",
        fill: "#fff"
    });

    // タップ判定
    this.input.on("pointerdown", () => {
        if (state === "safe") {
            onSuccess(this, 1); // ←通常
        } else if (state === "warning"){
            onSuccess(this, 3); // ←3倍！
        } else {
            onGameOver();
        }
    });

    enemyLoop.call(this);
}

function enemyLoop() {
    this.time.delayedCall(speed, () => {

        // 🟡 予兆
        enemy.setFillStyle(0xffff00);
        state = "warning"; // ←これ追加！

        // 点滅させる（2回）
        this.tweens.add({
            targets: enemy,
            alpha: 0.3,
            yoyo: true,
            repeat: 2,
            duration: 10,
            onComplete: () => {

                // 🔴 攻撃
                enemy.setFillStyle(0xff0000);
                enemy.alpha = 1;
                state = "danger";

                this.time.delayedCall(300, () => {

                    // 🟢 戻る
                    enemy.setFillStyle(0x00ff00);
                    state = "safe";

                    // ランダムスピード
                    speed = Phaser.Math.Between(200, 2000);

                    enemyLoop.call(this);
                });
            }
        });

    });
}

function update() {}

function onSuccess(scene, multiplier) {
    console.log("成功！ x" + multiplier);

    score += 1 * multiplier;
    scoreText.setText("Score: " + score);

    scoreText.setScale(1.2);
    scene.tweens.add({
        targets: scoreText,
        scale: 1,
        duration: 100
    });

    // GOOD表示も強化できる👇
    let text = multiplier >= 3 ? "PERFECT!" : "GOOD!";

    let msg = scene.add.text(enemy.x, enemy.y - 100, text, {
        fontSize: "40px",
        fill: multiplier >= 3 ? "#ff00ff" : "#ffff00"
    }).setOrigin(0.5);

    scene.tweens.add({
        targets: msg,
        y: 200,
        alpha: 0,
        duration: 300,
        onComplete: () => msg.destroy()
    });

    scene.cameras.main.shake(100, 0.01);

    // 成功時の演出
    if (multiplier >= 3) {
        enemy.setFillStyle(0xffff00); // PERFECT時は黄色
    } else {
        enemy.setFillStyle(0x00ff00); // GOOD時は緑
    }
}

function onGameOver() {
    alert("ゲームオーバー！ スコア: " + score);
    location.reload();
}

</script>

</body>
</html>
